# foundry configuration for the morrow commit contract.
# rpc url and chain id come from env, never hardcoded (see .env.example).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood = "${MORROW_RPC_URL}"
